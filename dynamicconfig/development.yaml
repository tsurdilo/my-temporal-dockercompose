#frontend
frontend.globalNamespaceRPS:
  - value: 1600
frontend.globalRPS:
  - value: 6000
frontend.persistenceMaxQPS:
  - value: 2400
frontend.activityAPIsEnabled:
  - value: true
frontend.namespaceCount:
  - value: 2000
frontend.globalNamespaceCount:
  - value: 50000
frontend.namespaceRPS.visibility:
  - value: 50
frontend.globalNamespaceRPS.visibility:
  - value: 500
# history
history.cacheSizeBasedLimit:
  - value: true
history.hostLevelCacheMaxSizeBytes:
  - value: 1048576000
history.cacheMaxSizeBytes:
  - value: 2097152
history.persistenceGlobalMaxQPS:
  - value: 36000
history.persistenceMaxQPS:
  - value: 16384
history.persistencePerShardNamespaceMaxQPS:
  - value: 500
history.cacheBackgroundEvict:
  - value:
      Enabled: true
      LoopInterval: 1m
      MaxEntryPerCall: 1024
    constraints: {}
#matching
matching.numTaskqueueReadPartitions:
  - value: 4
    constraints: {}
  - value: 1
    constraints: {
      namespace: 'default',
      taskQueueName: 'priority-tq'
    }
matching.numTaskqueueWritePartitions:
  - value: 4
    constraints: {}
  - value: 1
    constraints: {
      namespace: 'default',
      taskQueueName: 'priority-tq'
    }
matching.persistenceMaxQPS:
  - value: 2400
matching.useNewMatcher:
  - value: true
    constraints: {
      namespace: 'default',
      taskQueueName: 'priority-tq'
    }
matching.priorityLevels:
  - value: 10
matching.enableFairness:
  - value: true
    constraints: {
      namespace: 'default',
      taskQueueName: 'priority-tq'
    }
#system
system.secondaryVisibilityWritingMode:
  - value: "dual"
    constraints: {}
system.enableReadFromSecondaryVisibility:
  - value: false
    constraints: {}

